<!DOCTYPE html>
<html>
<head>

<title>Мої улюблені книги</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4 text-center">📚 Мої улюблені книги</h1>

<div class="text-end mb-3">
<a href="/add" class="btn btn-primary">➕ Додати книгу</a>
</div>

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>
<th>Назва</th>
<th>Автор</th>
<th>Рік</th>
</tr>

</thead>

<tbody>

{% for book in books %}

<tr>

<td>{{ book.title }}</td>
<td>{{ book.author }}</td>
<td>{{ book.year }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
